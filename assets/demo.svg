<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 560" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" role="img" aria-label="type-sprint race just finished, two players raced a JavaScript snippet and Alex won with 88 WPM">
  <title>type-sprint race demo</title>
  <desc>Two players race the same code snippet in real time over WebSockets. Live WPM, race progress bars, and the winner banner are shown.</desc>

  <!-- window -->
  <rect x="0" y="0" width="800" height="560" rx="14" fill="#0b0d12"/>
  <rect x="0.5" y="0.5" width="799" height="559" rx="14" fill="none" stroke="#262b38"/>

  <!-- title bar -->
  <rect x="0" y="0" width="800" height="42" rx="14" fill="#12151d"/>
  <rect x="0" y="21" width="800" height="21" fill="#12151d"/>
  <circle cx="26" cy="21" r="6" fill="#ff5c5c"/>
  <circle cx="46" cy="21" r="6" fill="#ffbd2e"/>
  <circle cx="66" cy="21" r="6" fill="#3ddc84"/>
  <text x="400" y="26" text-anchor="middle" font-size="13" fill="#8b93a7">type-sprint.dev/race</text>

  <!-- logo -->
  <text x="26" y="72" font-size="17" font-weight="700" fill="#e7ebf3">
    <tspan fill="#4f7cff">type</tspan><tspan>sprint</tspan>
  </text>
  <text x="774" y="72" text-anchor="end" font-size="13" fill="#8b93a7">Race</text>

  <!-- race track -->
  <g>
    <rect x="26" y="98" width="748" height="98" rx="12" fill="#12151d" stroke="#262b38"/>

    <!-- player lane, finished first -->
    <circle cx="50" cy="128" r="4" fill="#4f7cff"/>
    <text x="62" y="132" font-size="13" fill="#e7ebf3">Alex <tspan fill="#8b93a7">(you)</tspan></text>
    <text x="750" y="132" text-anchor="end" font-size="13" fill="#8b93a7">88 wpm</text>
    <rect x="50" y="140" width="700" height="10" rx="5" fill="#191d28"/>
    <rect x="50" y="140" width="700" height="10" rx="5" fill="#4f7cff"/>

    <!-- opponent lane, still finishing up -->
    <circle cx="50" cy="168" r="4" fill="#ff7a59"/>
    <text x="62" y="172" font-size="13" fill="#e7ebf3">Priya</text>
    <text x="750" y="172" text-anchor="end" font-size="13" fill="#8b93a7">74 wpm</text>
    <rect x="50" y="180" width="700" height="10" rx="5" fill="#191d28"/>
    <rect x="50" y="180" width="581" height="10" rx="5" fill="#ff7a59"/>
  </g>

  <!-- hud, final numbers -->
  <g font-size="13" fill="#8b93a7">
    <text x="26" y="228">WPM</text>
    <text x="140" y="228">ACCURACY</text>
    <text x="260" y="228">TIME</text>
  </g>
  <g font-size="22" font-weight="700">
    <text x="26" y="252" fill="#4f7cff">88</text>
    <text x="140" y="252" fill="#e7ebf3">99%</text>
    <text x="260" y="252" fill="#e7ebf3">0:12</text>
  </g>
  <rect x="26" y="264" width="748" height="4" rx="2" fill="#191d28"/>
  <rect x="26" y="264" width="748" height="4" rx="2" fill="#4f7cff"/>

  <!-- typing surface, fully typed since the race is over -->
  <rect x="26" y="288" width="748" height="170" rx="12" fill="#12151d" stroke="#3ddc84" stroke-opacity="0.4"/>
  <g font-size="17" fill="#e7ebf3" font-weight="700">
    <text x="50" y="326">function greet(name) {</text>
    <text x="50" y="354">  return `Hello, ${name}!`;</text>
    <text x="50" y="382">}</text>
  </g>

  <!-- winner banner (bottom) -->
  <g>
    <rect x="26" y="476" width="748" height="60" rx="12" fill="#12151d" stroke="#262b38"/>
    <circle cx="50" cy="506" r="5" fill="#3ddc84"/>
    <text x="66" y="511" font-size="14" font-weight="700" fill="#3ddc84">You win</text>
    <text x="750" y="500" text-anchor="end" font-size="12" fill="#8b93a7">Alex - 88 wpm - 99%</text>
    <text x="750" y="518" text-anchor="end" font-size="12" fill="#8b93a7">Priya - 74 wpm - 96%</text>
  </g>
</svg>
